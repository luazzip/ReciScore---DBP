<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head><meta charset="UTF-8"/><title>Recuperación de contraseña</title>
    <style>
        body{font-family:Arial,sans-serif;background:#f4f4f4}
        .container{max-width:600px;margin:30px auto;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .header{background:#b71c1c;padding:30px;text-align:center}.header h1{color:#fff;margin:0}
        .body{padding:30px;color:#333}.body p{font-size:16px;line-height:1.6}
        .contrasena{background:#fce4ec;border-left:4px solid #b71c1c;padding:12px 16px;border-radius:4px;margin:20px 0;font-family:monospace;font-size:20px;letter-spacing:2px;color:#b71c1c}
        .footer{background:#f1f1f1;text-align:center;padding:16px;font-size:12px;color:#888}
    </style></head>
<body>
<div class="container">
    <div class="header"><h1>ReciScore</h1></div>
    <div class="body">
        <p>Hola, <strong th:text="${nombre}">Usuario</strong>,</p>
        <p>Tu nueva contraseña temporal es:</p>
        <div class="contrasena" th:text="${nuevaContrasena}">contraseña</div>
        <p>Cámbiala inmediatamente después de iniciar sesión.</p>
        <p>— El equipo de <strong>ReciScore</strong></p>
    </div>
    <div class="footer">Correo automático, por favor no respondas.</div>
</div>
</body></html>
