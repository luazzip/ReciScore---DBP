<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head><meta charset="UTF-8"/><title>¡Bienvenido!</title>
    <style>
        body{font-family:Arial,sans-serif;background:#f4f4f4}
        .container{max-width:600px;margin:30px auto;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .header{background:#2e7d32;padding:30px;text-align:center}.header h1{color:#fff;margin:0}
        .body{padding:30px;color:#333}.body p{font-size:16px;line-height:1.6}
        .highlight{background:#e8f5e9;border-left:4px solid #2e7d32;padding:12px 16px;border-radius:4px;margin:20px 0}
        .footer{background:#f1f1f1;text-align:center;padding:16px;font-size:12px;color:#888}
    </style></head>
<body>
<div class="container">
    <div class="header"><h1>ReciScore</h1></div>
    <div class="body">
        <p>Hola, <strong th:text="${nombre}">Usuario</strong>,</p>
        <p>¡Tu cuenta en <strong>ReciScore</strong> ha sido creada exitosamente!</p>
        <div class="highlight"><p style="margin:0">Ya puedes iniciar sesión y comenzar a registrar tus reportes de reciclaje. 🌱</p></div>
        <p>— El equipo de <strong>ReciScore</strong></p>
    </div>
    <div class="footer">Correo automático, por favor no respondas.</div>
</div>
</body></html>
