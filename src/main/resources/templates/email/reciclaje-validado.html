<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head><meta charset="UTF-8"/><title>Reciclaje registrado</title>
    <style>
        body{font-family:Arial,sans-serif;background:#f4f4f4}
        .container{max-width:600px;margin:30px auto;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .header{background:#1565c0;padding:30px;text-align:center}.header h1{color:#fff;margin:0}
        .body{padding:30px;color:#333}.body p{font-size:16px;line-height:1.6}
        .puntos{background:#e3f2fd;border-left:4px solid #1565c0;padding:12px 16px;border-radius:4px;margin:20px 0;font-size:18px;font-weight:bold;color:#1565c0}
        .footer{background:#f1f1f1;text-align:center;padding:16px;font-size:12px;color:#888}
    </style></head>
<body>
<div class="container">
    <div class="header"><h1>ReciScore</h1></div>
    <div class="body">
        <p>¡Felicitaciones! Tu reciclaje ha sido confirmado. 🎉</p>
        <div class="puntos">+<span th:text="${puntosGanados}">0</span> puntos por reciclar <span th:text="${materialNombre}">material</span></div>
        <p>Sigue acumulando puntos. Cada acción hace una gran diferencia. 🌍</p>
        <p>— El equipo de <strong>ReciScore</strong></p>
    </div>
    <div class="footer">Correo automático, por favor no respondas.</div>
</div>
</body></html>
